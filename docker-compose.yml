services:
  web:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "30073:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm_store:/pnpm-store
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      - PNPM_STORE_DIR=/pnpm-store
      - VITE_OPEN=false
    command: sh -c "corepack enable && corepack prepare pnpm@11.9.0 --activate && pnpm install && pnpm dev --host 0.0.0.0 --port 5173"

volumes:
  node_modules:
  pnpm_store:
