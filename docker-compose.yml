services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: lsm-crm-web:latest
    container_name: lsm-crm-web
    restart: unless-stopped
    ports:
      # 仅本机回环可访问；外部访问请走宿主 Nginx 反向代理
      - "127.0.0.1:30073:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # 资源限制
    mem_limit: 256m
    cpus: "0.5"
    # 容器安全加固
    read_only: true
    tmpfs:
      - /tmp:size=32m
      - /var/cache/nginx:size=32m
      - /var/run:size=8m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE