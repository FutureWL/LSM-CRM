server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 安全:隐藏 nginx 版本
    server_tokens off;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # 安全响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # HSTS - 一年 + includeSubDomains + preload
    # 启用后浏览器会强制 HTTPS，即使证书过期也拒绝降级
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # CSP - 生产环境默认拒绝一切，按需放开
    #   - script-src 'self': 仅允许同源 JS（Vue 产物 + 编译后已无内联脚本）
    #   - style-src 'self' 'unsafe-inline': 保留 unsafe-inline 供 Vue scoped style 使用（v0.3 范围）
    #   - connect-src 'self': API 请求仅允许同源（Vite 反代 / nginx 反代 都在同源）
    #   - frame-ancestors 'none': 拒绝被 iframe 嵌入（防点击劫持）
    #   - base-uri 'self': 拒绝 <base href> 被改
    #   - form-action 'self': 仅允许同源表单提交
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # 健康检查端点 - Docker HEALTHCHECK 用
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # 构建元信息(只读,部署时由脚本生成,nginx 直接 serve)
    location = /version.json {
        access_log off;
        add_header Cache-Control "no-store" always;
        add_header Content-Type application/json always;
    }

    # Vite 输出的 hashed 静态资源 - 长期缓存(文件名带 hash,永不过期)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 其它静态资源
    location ~* \.(svg|png|jpg|jpeg|gif|ico|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback:所有前端路由都返回 index.html,让 vue-router 处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/* 反代到 api 容器(Hono on :3000)
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header  Set-Cookie;
        proxy_cookie_path  / /;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止访问部署相关文件(防止 Dockerfile/nginx.conf 泄漏)
    location ~* (Dockerfile|docker-compose|\.env|\.git) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
