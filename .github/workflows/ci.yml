# =============================================================================
# LSM-CRM CI
# =============================================================================
# jobs:
#   1. backend-test:   起 postgres 容器 -> migrate + seed -> bun test
#   2. frontend-check: type-check + vitest + build
#   3. e2e:            Playwright (webServer 自动起 vite + api)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------
  # 后端: bun test (需要 PG)
  # -------------------------------------------------------------------
  backend-test:
    name: backend / bun test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: lsm_crm
          POSTGRES_PASSWORD: lsm_crm_ci
          POSTGRES_DB: lsm_crm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lsm_crm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://lsm_crm:lsm_crm_ci@localhost:5432/lsm_crm
      SESSION_SECRET: ci-only-not-for-production-32bytes
      PORT: '33501'
      LOG_LEVEL: info
      COOKIE_INSECURE: '1'
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install deps
        working-directory: apps/api
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: apps/api
        run: bun run type-check

      - name: Migrate
        working-directory: apps/api
        run: bun run db:migrate

      - name: Seed (full)
        working-directory: apps/api
        run: bun run db:seed -- --full

      - name: Run tests
        working-directory: apps/api
        run: bun run test

  # -------------------------------------------------------------------
  # 前端: type-check + vitest + build
  # -------------------------------------------------------------------
  frontend-check:
    name: frontend / type-check + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # -------------------------------------------------------------------
  # e2e: Playwright (用 webServer 自动起 vite + api)
  # -------------------------------------------------------------------
  e2e:
    name: e2e / Playwright
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: lsm_crm
          POSTGRES_PASSWORD: lsm_crm_ci
          POSTGRES_DB: lsm_crm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lsm_crm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install deps (root)
        run: pnpm install --frozen-lockfile

      - name: Install deps (apps/api)
        working-directory: apps/api
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Migrate + seed (full)
        # webServer 起服务前先把 schema + 种子数据准备好
        # 不然登录会 401 (用户不存在)
        working-directory: apps/api
        env:
          DATABASE_URL: postgres://lsm_crm:lsm_crm_ci@localhost:5432/lsm_crm
          SESSION_SECRET: ci-only-32-bytes-not-for-prod
        run: |
          bun run db:migrate
          bun run db:seed -- --full

      - name: Run e2e
        # 之前用 webServer 自动起服务在 CI runner 上 vite proxy 没生效 (DEBUG env 传递问题)
        # 改成: CI step 用 nohup 显式起 vite + api (后置), Playwright 复用现有服务
        # 显式传 VITE_API_PROXY_TARGET 避免 localhost 解析问题
        run: |
          echo '--- 启动 API ---'
          cd apps/api
          nohup env DATABASE_URL=postgres://lsm_crm:lsm_crm_ci@localhost:5432/lsm_crm \
            SESSION_SECRET=ci-only-32-bytes-not-for-prod \
            COOKIE_INSECURE=1 \
            NODE_ENV=test \
            bun run dev > /tmp/api-e2e.log 2>&1 &
          echo "api pid: $!"
          cd ../..

          echo '--- 启动 Vite ---'
          nohup env VITE_API_PROXY_TARGET=http://127.0.0.1:33501 \
            pnpm dev > /tmp/vite-e2e.log 2>&1 &
          echo "vite pid: $!"

          echo '--- 等待服务就绪 ---'
          for i in {1..30}; do
            if curl -sS -m 1 -o /dev/null -w '%{http_code}' http://127.0.0.1:33500/ 2>/dev/null | grep -q 200 \
              && curl -sS -m 1 -o /dev/null -w '%{http_code}' http://127.0.0.1:33501/api/v1/health 2>/dev/null | grep -q 200; then
              echo "services up after ${i}s"
              break
            fi
            sleep 1
          done

          echo '--- 跑 e2e ---'
          pnpm e2e
          e2e_exit=$?

          echo '--- 清理服务 ---'
          pkill -f 'bun run.*src/main.ts' || true
          pkill -f 'node.*vite' || true

          exit $e2e_exit

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
            /tmp/api-e2e.log
            /tmp/vite-e2e.log
          retention-days: 7
